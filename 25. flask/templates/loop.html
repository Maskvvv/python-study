<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        ul { list-style-type: none; padding: 0; }
        li { background: #e8f4f8; margin: 8px 0; padding: 12px 20px; border-radius: 6px; }
        li:hover { background: #d0e8f0; }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>
    <h2>技术列表：</h2>
    <ul>
        {% for item in items %}
        <li>{{ loop.index }}. {{ item }}</li>
        {% endfor %}
    </ul>
    <p>共有 {{ items|length }} 个项目</p>
    <p><a href="{{ url_for('index') }}">返回首页</a></p>
</body>
</html>
